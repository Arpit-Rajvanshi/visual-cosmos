version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: cosmos_mongodb
    ports:
      - "27017:27017"
    volumes:
      - cosmos_data:/data/db

  server:
    build:
      context: ./server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongodb:27017/virtual_cosmos
      - NODE_ENV=production
    depends_on:
      - mongodb
      
  client:
    build:
      context: ./client
    ports:
      - "5174:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - server

volumes:
  cosmos_data:
